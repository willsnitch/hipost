<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>say hi !!</title>

  <!-- Twitter Card meta tags -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="say hi !!">
  <meta name="twitter:description" content="click the button and say hiiiii to everyone 👋">

  <!-- Open Graph (fallback) -->
  <meta property="og:title" content="say hi !!">
  <meta property="og:description" content="click the button and say hiiiii to everyone 👋">
  <meta property="og:type" content="website">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    p {
      color: #71767b;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #1d9bf0;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 9999px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #1a8cd8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>hiiiii 👋</h1>
    <p>click the button below to say hi to everyone!!</p>
    <a class="btn" href="https://twitter.com/intent/tweet?text=hiiiii">say hi !!</a>
  </div>
</body>
</html>
